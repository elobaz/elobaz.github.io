<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>진주헌 Mandarin Garden | 주변 소개</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Pretendard, Noto Sans KR, sans-serif;
  color:#000;
}
body{
  background:linear-gradient(180deg,#f4f7f2 0%,#eef4e8 100%);
  overflow-x:hidden;
}

header{
  position:fixed;
  top:0; left:0;
  width:100%;
  padding:28px 60px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(6px);
  z-index:100;
}

.main-logo img{height:84px;}

.header-right{
  display:flex;
  align-items:center;
}

nav{
  display:flex;
  align-items:center;
}

nav a{
  margin-left:36px;
  font-size:14px;
  letter-spacing:1px;
  text-decoration:none;
}

.lang-buttons{
  margin-left:30px;
  border:1px solid #000;
  padding:6px 10px;
  border-radius:6px;
}

.lang-buttons button{
  margin:0 4px;
  font-size:12px;
  padding:6px 10px;
  background:transparent;
  border:1px solid #000;
  cursor:pointer;
  border-radius:4px;
}

.container{
  max-width:1200px;
  margin:0 auto;
  padding:180px 24px 120px;
}

.blog-section{
  text-align:center;
  padding:120px 20px 160px;
}
.blog-section h2{
  font-size:28px;
  letter-spacing:3px;
  margin-bottom:20px;
}
.blog-section p{
  font-size:15px;
  margin-bottom:40px;
}
.blog-button{
  display:inline-block;
  padding:16px 42px;
  border:1px solid #000;
  text-decoration:none;
  font-size:14px;
  transition:0.3s;
}
.blog-button:hover{
  background:#000;
  color:#fff;
}

.section{
  padding:120px 0;
}
.section:nth-child(even){
  background:#f8fbf6;
}
.section-title{
  font-size:22px;
  letter-spacing:3px;
  margin-bottom:60px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:40px;
}

.card{
  background:#fff;
  padding:30px;
  border-radius:10px;
  box-shadow:0 15px 35px rgba(0,0,0,0.05);
}
.card h3{
  font-size:16px;
  letter-spacing:2px;
  margin-bottom:14px;
}
.map{
  width:100%;
  height:240px;
  border:0;
  border-radius:6px;
  margin-bottom:16px;
}
.map-btn{
  display:inline-block;
  padding:10px 20px;
  border:1px solid #000;
  text-decoration:none;
  font-size:13px;
}
.map-btn:hover{
  background:#000;
  color:#fff;
}

@media(max-width:768px){
  header{padding:20px 24px}
  .main-logo img{height:64px}
  nav a{margin-left:20px;font-size:13px}
  .header-right{flex-direction:column;align-items:flex-start;margin-top:10px}
  .lang-buttons{margin-left:0;margin-top:10px}
  .container{padding-top:140px}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header>
  <a href="index.html" class="main-logo">
    <img src="진주헌로고.svg" alt="진주헌">
  </a>

  <div class="header-right">
    <nav>
      <a href="101.html" data-key="nav101">101동</a>
      <a href="102.html" data-key="nav102">102동</a>
      <a href="around.html" data-key="navAbout">숙소소개</a>
      <a href="reservation.html" data-key="navReservation">예약</a>
    </nav>

    <div class="lang-buttons">
      <button onclick="changeLanguage('ko')">KO</button>
      <button onclick="changeLanguage('en')">EN</button>
      <button onclick="changeLanguage('fr')">FR</button>
      <button onclick="changeLanguage('zh')">中文</button>
    </div>
  </div>
</header>

<div class="container">

<section class="blog-section">
  <h2 data-key="storyTitle">JINJUHEON STORY</h2>
  <p data-key="storyDesc">
    진주헌의 공간 이야기와 제주 여행 기록을 만나보세요.
  </p>
  <a href="https://m.blog.naver.com/PostList.naver?blogId=lyb7427&tab=1"
     target="_blank"
     class="blog-button"
     data-key="blogBtn">
     네이버 블로그 보러가기 →
  </a>
</section>

<section class="section">
  <div class="section-title" data-key="tourCourse">현지인 추천 관광코스</div>
  <div class="grid">

    <div class="card"><h3>군산오름</h3><iframe class="map" src="https://www.google.com/maps?q=군산오름&output=embed"></iframe><a class="map-btn" target="_blank" href="https://map.naver.com/v5/search/군산오름">길찾기 →</a></div>
    <div class="card"><h3>논짓물</h3><iframe class="map" src="https://www.google.com/maps?q=논짓물 제주&output=embed"></iframe><a class="map-btn" target="_blank" href="https://map.naver.com/v5/search/논짓물 제주">길찾기 →</a></div>
    <div class="card"><h3>박수기정</h3><iframe class="map" src="https://www.google.com/maps?q=박수기정 제주&output=embed"></iframe><a class="map-btn" target="_blank" href="https://map.naver.com/v5/search/박수기정 제주">길찾기 →</a></div>
    <div class="card"><h3>갯갓주상절리대</h3><iframe class="map" src="https://www.google.com/maps?q=갯갓주상절리대&output=embed"></iframe><a class="map-btn" target="_blank" href="https://map.naver.com/v5/search/갯갓주상절리대">길찾기 →</a></div>
    <div class="card"><h3>대왕수천예래 생태공원</h3><iframe class="map" src="https://www.google.com/maps?q=대왕수천예래 생태공원&output=embed"></iframe><a class="map-btn" target="_blank" href="https://map.naver.com/v5/search/대왕수천예래 생태공원">길찾기 →</a></div>
    <div class="card"><h3>용머리해안</h3><iframe class="map" src="https://www.google.com/maps?q=용머리해안&output=embed"></iframe><a class="map-btn" target="_blank" href="https://map.naver.com/v5/search/용머리해안">길찾기 →</a></div>
    <div class="card"><h3>천제연 제1폭포</h3><iframe class="map" src="https://www.google.com/maps?q=천제연 제1폭포&output=embed"></iframe><a class="map-btn" target="_blank" href="https://map.naver.com/v5/search/천제연 제1폭포">길찾기 →</a></div>
    <div class="card"><h3>중문 색달 해수욕장</h3><iframe class="map" src="https://www.google.com/maps?q=중문 색달 해수욕장&output=embed"></iframe><a class="map-btn" target="_blank" href="https://map.naver.com/v5/search/중문 색달 해수욕장">길찾기 →</a></div>
    <div class="card"><h3>화순금모래해변</h3><iframe class="map" src="https://www.google.com/maps?q=화순금모래해변&output=embed"></iframe><a class="map-btn" target="_blank" href="https://map.naver.com/v5/search/화순금모래해변">길찾기 →</a></div>

  </div>
</section>

</div>

<script src="lang.js"></script>
</body>
</html>
